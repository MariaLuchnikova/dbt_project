sources:
  - name: demo_src
    description: source database
    tables:
      - name: airplanes
        description: table of airplane
      - name: airports
        descriptions: table of airport
      - name: seats
      - name: bookings
        columns:
          - name: book_ref
          - name: book_date
          - name: total_amount
        freshness:
          warn_after: { count: 6000, period: hour }
          error_after: { count: 10000, period: day }
          filter: current_timestamp::date - book_date::date < 30000
        loaded_at_field: book_date::timestamp
